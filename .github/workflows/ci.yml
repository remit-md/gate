name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Check
        run: cargo check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Test
        run: cargo test

  worker-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm install
      - run: npx tsc --noEmit

  create-pay-gate-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: create-pay-gate
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm install
      - run: npx tsc --noEmit
