name: Acceptance Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-rust:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build Rust binary
        working-directory: rust
        run: cargo build --release

      - name: Install acceptance deps
        working-directory: acceptance
        run: npm install

      - name: Compile acceptance tests
        working-directory: acceptance
        run: npx tsc

      - name: Start mock origin
        working-directory: acceptance
        run: npx tsx mock-origin.ts &

      - name: Start mock facilitator
        working-directory: acceptance
        run: npx tsx mock-facilitator.ts &

      - name: Start pay-gate (passthrough, fail-closed)
        run: |
          ./rust/target/release/pay-gate dev \
            --config acceptance/configs/passthrough.yaml \
            --port 8402 \
            --facilitator-url http://localhost:9091 &
          sleep 1

      - name: Start pay-gate (block mode)
        run: |
          ./rust/target/release/pay-gate dev \
            --config acceptance/configs/block.yaml \
            --port 8403 \
            --facilitator-url http://localhost:9091 &
          sleep 1

      - name: Start pay-gate (fail-open mode)
        run: |
          ./rust/target/release/pay-gate dev \
            --config acceptance/configs/fail-open.yaml \
            --port 8404 \
            --facilitator-url http://localhost:9091 &
          sleep 1

      - name: Run main acceptance tests
        working-directory: acceptance
        run: npx tsx --test tests/gate.test.ts
        env:
          TARGET: rust
          GATE_PORT: "8402"

      - name: Run block mode tests
        working-directory: acceptance
        run: npx tsx --test tests/gate-block.test.ts
        env:
          TARGET: rust
          BLOCK_GATE_PORT: "8403"

      - name: Run fail-open tests
        working-directory: acceptance
        run: npx tsx --test tests/gate-failopen.test.ts
        env:
          TARGET: rust
          FAILOPEN_GATE_PORT: "8404"

      - name: Run config validation tests
        working-directory: acceptance
        run: npx tsx --test tests/gate-config.test.ts
        env:
          TARGET: rust
          PAY_GATE_BINARY: "../rust/target/release/pay-gate"

  test-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install worker deps
        working-directory: worker
        run: npm install

      - name: Install acceptance deps
        working-directory: acceptance
        run: npm install

      - name: Compile acceptance tests
        working-directory: acceptance
        run: npx tsc

      - name: Start mock origin
        working-directory: acceptance
        run: npx tsx mock-origin.ts &

      - name: Start mock facilitator
        working-directory: acceptance
        run: npx tsx mock-facilitator.ts &

      - name: Start pay-gate (Worker)
        working-directory: worker
        run: npx wrangler dev --port 8402 &
        env:
          PROXY_TARGET: "http://localhost:9090"
          FACILITATOR_URL: "http://localhost:9091"
          PROVIDER_ADDRESS: "0x1234567890abcdef1234567890abcdef12345678"
          DEFAULT_ACTION: "passthrough"
          FAIL_MODE: "closed"

      - name: Wait for worker
        run: sleep 3

      - name: Run main acceptance tests
        working-directory: acceptance
        run: npx tsx --test tests/gate.test.ts
        env:
          TARGET: worker
          GATE_PORT: "8402"
