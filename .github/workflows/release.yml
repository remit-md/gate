name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  ci-gate:
    name: Require green CI
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Wait for CI to pass on tag commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          REF_JSON=$(gh api "repos/$REPO/git/refs/tags/$TAG")
          OBJ_TYPE=$(echo "$REF_JSON" | jq -r '.object.type')
          OBJ_SHA=$(echo "$REF_JSON" | jq -r '.object.sha')
          if [ "$OBJ_TYPE" = "tag" ]; then
            SHA=$(gh api "repos/$REPO/git/tags/$OBJ_SHA" --jq '.object.sha')
          else
            SHA="$OBJ_SHA"
          fi
          echo "Tag $TAG -> commit $SHA"
          for attempt in $(seq 1 40); do
            MAP=$(gh api "repos/$REPO/commits/$SHA/check-runs?per_page=100" \
              --jq '[.check_runs[] | select(.name != "Require green CI") | {name, status, conclusion}]')
            TOTAL=$(echo "$MAP" | jq 'length')
            FAILED=$(echo "$MAP" | jq '[.[] | select(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out" or .conclusion == "action_required")] | length')
            PENDING=$(echo "$MAP" | jq '[.[] | select(.status == "queued" or .status == "in_progress")] | length')
            if [ "$FAILED" -gt 0 ]; then
              echo "::error::CI failed on $SHA ($FAILED failing check(s))"
              echo "$MAP" | jq -r '.[] | [.name, .status, (.conclusion // "-")] | @tsv'
              exit 1
            fi
            if [ "$TOTAL" -gt 0 ] && [ "$PENDING" -eq 0 ]; then
              echo "All CI checks green on $SHA:"
              echo "$MAP" | jq -r '.[] | [.name, (.conclusion // "-")] | @tsv'
              exit 0
            fi
            echo "[$attempt/40] $TOTAL check(s), $PENDING pending - waiting 30s"
            sleep 30
          done
          echo "::error::Timed out waiting for CI on $SHA (no completion in 20 min)"
          exit 1

  build:
    needs: ci-gate
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: pay-gate
            artifact: pay-gate-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: pay-gate
            artifact: pay-gate-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: pay-gate
            artifact: pay-gate-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: pay-gate
            artifact: pay-gate-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: pay-gate.exe
            artifact: pay-gate-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary
        shell: bash
        run: cp rust/target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: pay-gate-linux-amd64
          path: .

      - name: Make binary executable
        run: chmod +x pay-gate-linux-amd64

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/pay-skill/gate:${{ github.ref_name }}
            ghcr.io/pay-skill/gate:latest

      - name: Log in to Docker Hub
        if: env.DOCKER_TOKEN != ''
        uses: docker/login-action@v4
        with:
          username: payskillhq
          password: ${{ secrets.DOCKER_TOKEN }}
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}

      - name: Push to Docker Hub
        if: env.DOCKER_TOKEN != ''
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            payskillhq/gate:${{ github.ref_name }}
            payskillhq/gate:latest
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}

  crates-io:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        working-directory: rust
        run: cargo publish --allow-dirty --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  npm:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Build create-pay-gate
        working-directory: create-pay-gate
        run: npm ci && npm run build
      - name: Publish to npm
        working-directory: create-pay-gate
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  helm:
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Package chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm package helm/pay-gate --version "$VERSION" --app-version "$VERSION"

      - name: Push to OCI registry
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm push "pay-gate-${VERSION}.tgz" oci://ghcr.io/pay-skill/charts

  release:
    runs-on: ubuntu-latest
    needs: [build, docker]
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
