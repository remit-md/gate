name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: pay-gate
            artifact: pay-gate-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: pay-gate
            artifact: pay-gate-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: pay-gate
            artifact: pay-gate-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: pay-gate
            artifact: pay-gate-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: pay-gate.exe
            artifact: pay-gate-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary
        shell: bash
        run: cp rust/target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: pay-gate-linux-amd64
          path: .

      - name: Make binary executable
        run: chmod +x pay-gate-linux-amd64

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/pay-skill/gate:${{ github.ref_name }}
            ghcr.io/pay-skill/gate:latest

  release:
    runs-on: ubuntu-latest
    needs: [build, docker]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
