# pay-gate sidecar configuration for nginx (using njs)
#
# Prerequisites:
#   1. nginx compiled with --with-http_js_module (ships with standard packages)
#   2. pay-gate start --sidecar  (listening on 127.0.0.1:8402)
#   3. Copy gate.js to your njs directory (e.g. /etc/nginx/njs/)
#
# Why njs instead of auth_request?
#   nginx's auth_request module only recognizes 2xx/401/403 from subrequests.
#   x402 requires returning 402 + custom headers (PAYMENT-REQUIRED) to the
#   client, which auth_request swallows as a 500. njs gives full control over
#   subrequest responses including status codes and headers.

load_module modules/ngx_http_js_module.so;

http {
    js_path /etc/nginx/njs/;
    js_import gate from gate.js;

    # njs subrequests buffer the full response in memory. Default is 4k/8k
    # which is too small for most API responses. Set to match your largest
    # expected response body (weather API returns ~50KB with 3-day forecast).
    subrequest_output_buffer_size 256k;

    server {
        listen 443 ssl;
        server_name api.example.com;

        ssl_certificate     /etc/ssl/certs/api.example.com.pem;
        ssl_certificate_key /etc/ssl/private/api.example.com.key;

        # --- Paid routes: gated through pay-gate via njs ---
        location /api/ {
            js_content gate.handle;
        }

        # --- Internal: pay-gate sidecar subrequest ---
        location = /__pay_check {
            internal;
            proxy_pass http://127.0.0.1:8402/__pay/check;
            proxy_set_header X-Original-URI    $request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header PAYMENT-SIGNATURE $http_payment_signature;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }

        # --- Internal: proxy to origin backend ---
        # Strips /__origin_proxy prefix so origin sees the real path.
        # e.g. /__origin_proxy/api/data?q=1 → http://localhost:8080/api/data?q=1
        location /__origin_proxy/ {
            internal;
            rewrite ^/__origin_proxy(/.*)$ $1 break;
            proxy_pass http://localhost:8080;
            proxy_set_header X-Pay-Verified  $http_x_pay_verified;
            proxy_set_header X-Pay-From      $http_x_pay_from;
            proxy_set_header X-Pay-Amount    $http_x_pay_amount;
            proxy_set_header X-Pay-Settlement $http_x_pay_settlement;
        }

        # --- Free routes: bypass pay-gate entirely ---
        location = /health {
            proxy_pass http://localhost:8080;
        }
    }
}
