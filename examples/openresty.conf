# pay-gate sidecar configuration for OpenResty (Lua)
#
# Prerequisites:
#   1. OpenResty installed (nginx + LuaJIT, available for Linux/Mac/Windows)
#   2. pay-gate start --sidecar  (listening on 127.0.0.1:8402)
#
# Why OpenResty instead of stock nginx auth_request?
#   nginx's auth_request module only recognizes 2xx/401/403 from subrequests.
#   x402 requires returning 402 + custom headers (PAYMENT-REQUIRED) to the
#   client, which auth_request swallows as a 500.
#
#   OpenResty's access_by_lua_block can inspect subrequest responses and
#   return any status code + headers. Same capability as njs, but works on
#   Windows too (njs does not).
#
# Alternatives:
#   - njs (stock nginx on Linux/Mac only) — see nginx.conf + gate.js
#   - Traefik forwardAuth — see traefik.yml (handles 402 natively)
#   - Caddy forward_auth — see Caddyfile (handles 402 natively)

server {
    listen 443 ssl;
    server_name api.example.com;

    ssl_certificate     /etc/ssl/certs/api.example.com.pem;
    ssl_certificate_key /etc/ssl/private/api.example.com.key;

    # --- Paid routes: gated through pay-gate via Lua ---
    location /api/ {
        access_by_lua_block {
            -- Subrequest to pay-gate sidecar
            local res = ngx.location.capture("/__pay_check", {
                method = ngx.HTTP_POST,
                always_forward_body = false,
            })

            if res.status == 402 then
                -- Forward 402 + x402 headers to client
                ngx.status = 402
                ngx.header["Content-Type"] = "application/json"

                local pr = res.header["Payment-Required"]
                if pr then
                    ngx.header["Payment-Required"] = pr
                end

                ngx.print(res.body)
                return ngx.exit(ngx.OK)
            end

            if res.status ~= 200 then
                -- Forward other errors (403, 429, 503) as-is
                ngx.status = res.status
                if res.header["Content-Type"] then
                    ngx.header["Content-Type"] = res.header["Content-Type"]
                end
                ngx.print(res.body)
                return ngx.exit(ngx.OK)
            end

            -- 200 = authorized. Forward pay headers to origin.
            local pay_headers = {
                "X-Pay-Verified", "X-Pay-From",
                "X-Pay-Amount", "X-Pay-Settlement",
                "Payment-Response",
            }
            for _, h in ipairs(pay_headers) do
                local val = res.header[h]
                if val then
                    ngx.req.set_header(h, val)
                end
            end
            -- Fall through to proxy_pass
        }

        proxy_pass http://localhost:8080;
    }

    # --- Internal: pay-gate sidecar check ---
    location = /__pay_check {
        internal;
        proxy_pass http://127.0.0.1:8402/__pay/check;
        proxy_set_header X-Original-URI    $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header PAYMENT-SIGNATURE $http_payment_signature;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    # --- Free routes: bypass pay-gate entirely ---
    location = /health {
        proxy_pass http://localhost:8080;
    }
}
