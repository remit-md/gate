version: 1

provider_address: "0x1234567890abcdef1234567890abcdef12345678"

proxy:
  target: "http://localhost:9090"
  timeout: "30s"

routes:
  - path: "/api/v1/premium/*"
    price: "0.01"
    settlement: "tab"

  - path: "/api/v1/health"
    free: true

default_action: "passthrough"

global_allowlist: []

rate_limits:
  per_agent: "50/s"
  verification: "100/s"

fail_mode: "open"

log:
  level: "debug"
  format: "json"
